# Netlify configuration for Nasser Al Ali Enterprises site

[build]
  publish   = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Nice URL for the chat function
[[redirects]]
  from   = "/api/chat"
  to     = "/.netlify/functions/chat"
  status = 200

# Contact form → serverless email dispatcher (no Netlify Forms dependency)
[[redirects]]
  from   = "/api/contact"
  to     = "/.netlify/functions/contact-submit"
  status = 200
