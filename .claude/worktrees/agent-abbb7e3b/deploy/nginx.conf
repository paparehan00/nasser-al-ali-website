# Nginx server-block snippet for the React SPA.
# Drop this INSIDE your existing `server { ... }` block or use as reference.

# Point this to wherever you upload the built dist/ folder.
root /var/www/nasser-al-ali/dist;
index index.html;

# Serve real files (assets, images) directly; SPA-fallback everything else.
location / {
    try_files $uri $uri/ /index.html;
}

# Long-cache hashed build assets. Vite emits content-hashed filenames so
# `immutable` is safe here.
location ~* \.(?:js|css|woff2?|webp|jpg|jpeg|png|mp4|webm|svg|ico)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
    try_files $uri =404;
}

# Never cache the HTML shell - every deploy changes the referenced hashed
# asset filenames, so the browser must always re-fetch index.html to see them.
location = /index.html {
    add_header Cache-Control "no-store, must-revalidate";
    expires 0;
}

# Gzip / Brotli (Nginx must have the modules enabled)
gzip on;
gzip_vary on;
gzip_types
    text/plain
    text/css
    application/javascript
    application/json
    image/svg+xml;
